name: Build (iOS)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build and Test (iOS)
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Build and test iOS targets + XCFramework
        run: >
          ./gradlew
          compileKotlinIosArm64
          compileKotlinIosSimulatorArm64
          compileKotlinIosX64
          iosSimulatorArm64Test
          assembleAssertMatchesXCFramework
          --no-configuration-cache

      - name: Upload test reports (iOS)
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-ios
          path: |
            build/reports/tests/
            build/test-results/
          retention-days: 7
          if-no-files-found: warn
